<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة رمز - RAMZ | الموقع الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- خلفية الجسيمات -->
    <div class="bg-particles" id="bgParticles"></div>

    <header>
        <div class="header-inner">
            <div class="logo-area">
                <div class="logo-glow-ring"></div>
                <img src="1000050243.png" alt="شعار لعبة رمز" id="mainLogo">
            </div>
            <div class="header-text">
                <h1 class="game-title">رَمْـز</h1>
                <div class="title-divider"><span></span><span class="diamond">◆</span><span></span></div>
                <p class="tagline">لعبة التخطيط والخداع &nbsp;·&nbsp; ٢–٦ لاعبين</p>
            </div>
        </div>
        <div class="header-scroll-hint">▾</div>
    </header>

    <div class="main-container">

        <!-- قسم المعرض -->
        <section class="gallery-section">
            <h2 class="section-title">
                <span class="title-line"></span>
                أبطال الملحمة والبطاقات
                <span class="title-line"></span>
            </h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="1000050240.png" alt="جميع الشخصيات">
                    <div class="gallery-overlay"><span>جميع الشخصيات</span></div>
                </div>
                <div class="gallery-item">
                    <img src="1000050247.png" alt="بطاقة الزعيم">
                    <div class="gallery-overlay"><span>بطاقة الزعيم</span></div>
                </div>
                <div class="gallery-item">
                    <img src="1000050245.png" alt="بطاقة المتمرد">
                    <div class="gallery-overlay"><span>بطاقة المتمرد</span></div>
                </div>
                <div class="gallery-item">
                    <img src="1000050246.png" alt="ظهر البطاقة">
                    <div class="gallery-overlay"><span>ظهر البطاقة</span></div>
                </div>
            </div>
        </section>

        <!-- قسم التقييم -->
        <section class="rating-section card-style">
            <h2 class="section-title">
                <span class="title-line"></span>
                قيّم تجربتك مع رَمْز
                <span class="title-line"></span>
            </h2>
            <div class="star-rating">
                <input type="radio" name="rating" id="star5" value="5"><label for="star5" title="ممتاز">★</label>
                <input type="radio" name="rating" id="star4" value="4"><label for="star4" title="جيد جداً">★</label>
                <input type="radio" name="rating" id="star3" value="3"><label for="star3" title="جيد">★</label>
                <input type="radio" name="rating" id="star2" value="2"><label for="star2" title="مقبول">★</label>
                <input type="radio" name="rating" id="star1" value="1"><label for="star1" title="ضعيف">★</label>
            </div>
            <div class="input-group">
                <textarea id="ratingNote" placeholder="أضف ملاحظاتك أو انطباعك عن اللعبة..."></textarea>
            </div>
            <button onclick="sendRatingToTelegram()" class="btn-secondary">
                <span class="btn-icon">✦</span> إرسال التقييم
            </button>
        </section>

        <!-- قسم الطلب -->
        <section class="order-section card-style">
            <h2 class="section-title">
                <span class="title-line"></span>
                اطلب نسختك الآن
                <span class="title-line"></span>
            </h2>
            <div class="order-form">
                <div class="input-group">
                    <label for="custName">الاسم الكامل</label>
                    <input type="text" id="custName" placeholder="أدخل اسمك الكريم">
                </div>
                <div class="input-group">
                    <label for="custPhone">رقم الهاتف - واتساب</label>
                    <input type="tel" id="custPhone" placeholder="0XXXXXXXXX">
                </div>
                <div class="input-group">
                    <label for="custEmail">البريد الإلكتروني</label>
                    <input type="email" id="custEmail" placeholder="example@mail.com">
                </div>
                <div class="input-group">
                    <label for="orderNote">ملاحظات إضافية</label>
                    <textarea id="orderNote" placeholder="أضف أي ملاحظة خاصة بطلبك هنا..."></textarea>
                </div>
                <button onclick="sendOrderToTelegram()" class="btn-primary">
                    <span class="btn-icon">📜</span> تأكيد الطلب وإرسال
                </button>
            </div>
        </section>

    </div>

    <!-- نافذة النجاح -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-box">
            <div class="success-icon">✦</div>
            <p id="successMsg">تم الإرسال بنجاح!</p>
            <button onclick="closeSuccess()" class="btn-secondary" style="margin-top:20px;">إغلاق</button>
        </div>
    </div>

        <div class="footer-ornament">◆ ◆ ◆</div>

        </div>

    </footer>

</body>
